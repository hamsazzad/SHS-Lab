name: Build & Release APKs

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK (all ABIs)
        run: ./gradlew assembleDebug

      - name: List generated APKs
        run: find app/build/outputs -name "*.apk" | sort

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SHS-Lab-APKs
          path: app/build/outputs/apk/**/*.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "SHS Lab v1.0.0 - Heaven for Android Coders"
          body: |
            ## SHS Lab v1.0.0 🚀

            **Heaven for Android Coders** — Full-featured coding environment for Android.

            ### 📦 APK Downloads
            Download the APK for your device architecture:
            - **armeabi-v7a**: Most older Android phones (32-bit ARM)
            - **arm64-v8a**: Modern Android phones (64-bit ARM) ← Recommended
            - **x86**: Emulators (32-bit)
            - **x86_64**: Emulators (64-bit)
            - **universal**: Works on all devices (larger file size)

            ### ✨ Features
            - 📁 File Manager with batch import, create, rename, delete
            - 🗜️ ZIP Engine — extract & repack with memory-safe chunked I/O
            - 💻 Integrated Code Editor — CodeMirror 5 with syntax highlighting
            - 🌐 Live Preview — NanoHTTPD local server at localhost:18080
            - Glassmorphism dark UI optimized for 2GB RAM devices
            - Supports Android 4.4 (API 19) → Android 14 (API 34)

            ### ⚠️ Installation
            Enable "Install from Unknown Sources" before installing.
          files: app/build/outputs/apk/**/*.apk
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
