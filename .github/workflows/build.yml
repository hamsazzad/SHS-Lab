name: Build & Release APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Accept SDK licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_HOME/licenses/android-sdk-license

      - name: Build Debug APKs
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:+HeapDumpOnOutOfMemoryError"

      - name: Collect APKs
        run: |
          mkdir -p release_apks
          find app/build/outputs/apk -name "*.apk" -exec sh -c \
            'cp "$1" "release_apks/SHSLab-v1.0.0-$(basename $1)"' _ {} \;
          ls -lh release_apks/

      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SHS-Lab-APKs-v1.0.0
          path: release_apks/*.apk
          retention-days: 30

      - name: Create Release with APKs
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          name: "SHS Lab v1.0.0 - Heaven for Android Coders"
          body: |
            ## SHS Lab v1.0.0

            Full-featured Android coding IDE.

            ### Download the correct APK for your device:
            - `arm64-v8a` → Modern phones (64-bit ARM) **Recommended**
            - `armeabi-v7a` → Older phones (32-bit ARM)  
            - `universal` → Any device

            ### Features
            - File Manager with batch import/create/rename/delete/ZIP
            - Integrated Code Editor with syntax highlighting (CodeMirror)
            - Live Preview via local HTTP server
            - Android 5.0 to Android 14 support
            - Optimized for 2GB RAM devices
          files: release_apks/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
