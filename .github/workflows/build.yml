name: Build & Release APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Show Android SDK info
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          ls $ANDROID_HOME/build-tools/ | tail -3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build Debug APKs (all ABIs + universal)
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx1500m"

      - name: List all generated APKs
        run: find app/build/outputs/apk -name "*.apk" | sort

      - name: Rename APKs for clarity
        run: |
          mkdir -p release_apks
          for apk in $(find app/build/outputs/apk -name "*.apk"); do
            name=$(basename "$apk" .apk)
            cp "$apk" "release_apks/SHSLab-v1.0.0-${name}.apk"
          done
          ls -lh release_apks/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SHS-Lab-APKs-v1.0.0
          path: release_apks/*.apk

      - name: Delete old release if exists
        run: |
          TAG="v1.0.0"
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" | \
            grep '"id"' | head -1 | grep -o '[0-9]*')
          if [ -n "$RELEASE_ID" ]; then
            curl -s -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
            echo "Deleted old release $RELEASE_ID"
          fi

      - name: Create GitHub Release & Upload APKs
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          name: "SHS Lab v1.0.0 - Heaven for Android Coders 🚀"
          body: |
            ## SHS Lab v1.0.0

            **Heaven for Android Coders** — Full-featured mobile coding IDE.

            ### 📦 Download the right APK for your device:
            | File | Device Type |
            |------|------------|
            | `*arm64-v8a*` | Modern Android phones (64-bit ARM) ← **Recommended** |
            | `*armeabi-v7a*` | Older Android phones (32-bit ARM) |
            | `*x86_64*` | 64-bit emulators |
            | `*x86*` | 32-bit emulators |
            | `*universal*` | Any device (largest file) |

            ### ✨ Features
            - 📁 **File Manager** — Browse, create, rename, delete, batch import
            - 🗜️ **ZIP Engine** — Extract & repack with memory-safe chunked processing
            - 💻 **Code Editor** — CodeMirror with syntax highlighting for 10+ languages
            - 🌐 **Live Preview** — Local HTTP server renders HTML/CSS/JS instantly
            - 🎨 **Glassmorphism UI** — Sleek dark theme optimized for 2GB RAM

            ### 📱 Requirements
            - Android 5.0+ (API 21) through Android 14 (API 34)
            - Minimum 2GB RAM (optimized for low-end devices)

            ### ⚠️ Install
            Enable **"Install unknown apps"** before installing the APK.
          files: release_apks/*.apk
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
